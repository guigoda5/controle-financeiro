<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guigo da 5 - Finanças Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a;
            --text-color: #e0e0e0;
            --text-muted: #9ba1a6;
            --green: #00e676;
            --red: #ff5252;
            --blue: #03dac6;
            --orange: #ff9800;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 15% 50%, #1a1c2c, var(--bg-dark) 50%),
                        radial-gradient(circle at 85% 30%, #15232d, var(--bg-dark) 50%);
            color: var(--text-color); min-height: 100vh; padding: 20px; overflow-x: hidden;
        }

        /* REMOVENDO SETAS DOS INPUTS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }

        input, select { 
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); border-radius: 12px; 
            color: #fff; font-size: 14px; outline: none; transition: all 0.3s ease; 
        }
        
        input:focus { border-color: var(--blue); background: rgba(0,0,0,0.6); box-shadow: 0 0 10px rgba(3, 218, 198, 0.2); }

        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        .divider-title { text-align: center; font-size: 20px; font-weight: 600; letter-spacing: 2px; margin: 30px 0 15px; color: #fff; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; }

        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .summary-card { padding: 15px; text-align: center; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); }
        .summary-card h4 { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .val-plus { color: var(--green); } .val-minus { color: var(--red); } .val-debt { color: var(--orange); }

        .btn-main { padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        
        .progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); width: 0%; transition: width 0.5s; }

        .list, .debt-list { list-style: none; }
        .list li, .debt-item { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .debt-item.pendente { border-left: 4px solid var(--orange); }
        .debt-item.pago { border-left: 4px solid var(--green); opacity: 0.5; }

        .delete-btn { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 10px; }
        
        .debt-inputs { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; margin-bottom: 15px; }

        @media (max-width: 850px) {
            .layout { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr 1fr; }
            .debt-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h1 style="font-size: 24px; letter-spacing: 2px; color: var(--blue);">GUIGO DA 5</h1>
        <button onclick="exportData()" style="background:none; border:1px solid var(--glass-border); color:white; padding:5px 12px; border-radius:8px; cursor:pointer; font-size:12px;">💾 Backup</button>
    </header>

    <div class="layout">
        <div class="glass-panel">
            <h2 style="font-size:16px; margin-bottom:15px; color: var(--blue);">Nova Transação</h2>
            <form id="form" style="display:grid; gap:10px;">
                <input type="text" id="text" placeholder="Ex: Mercado, Cinema..." required />
                <input type="number" id="amount" placeholder="Valor R$" step="0.01" required />
                <input type="date" id="date" required />
                <select id="type">
                    <option value="minus">Saída (-)</option>
                    <option value="plus">Entrada (+)</option>
                </select>
                <button type="submit" class="btn-main" style="background:var(--red); color:white;">Salvar</button>
            </form>
        </div>

        <div class="panel-center">
            <div class="summary-grid">
                <div class="summary-card"><h4>Saldo</h4><h2 id="balance" style="font-size:18px;">R$ 0,00</h2></div>
                <div class="summary-card"><h4>Ganhos</h4><h2 id="money-plus" class="val-plus" style="font-size:18px;">R$ 0,00</h2></div>
                <div class="summary-card"><h4>Gastos</h4><h2 id="money-minus" class="val-minus" style="font-size:18px;">R$ 0,00</h2></div>
                <div class="summary-card"><h4>Dívidas</h4><h2 id="money-debt" class="val-debt" style="font-size:18px;">R$ 0,00</h2></div>
            </div>

            <div class="glass-panel" style="border-top: 3px solid var(--blue);">
                <h2 style="font-size:14px; margin-bottom:10px;">🎯 Meta de Economia</h2>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="goal-name" placeholder="Nome da Meta" onchange="saveGoal()">
                    <input type="number" id="goal-target" placeholder="Valor Meta R$" onchange="saveGoal()">
                </div>
                <div class="progress-container"><div class="progress-bar" id="goal-bar"></div></div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span id="goal-status" style="font-size:11px; color:var(--text-muted);">R$ 0 / R$ 0</span>
                    <button onclick="addToGoal()" style="background:var(--blue); border:none; padding:4px 12px; border-radius:6px; font-weight:600; cursor:pointer; font-size:12px;">+ Guardar</button>
                </div>
            </div>

            <h3 class="divider-title">Extrato</h3>
            <div class="glass-panel"><ul id="list" class="list"></ul></div>

            <h3 class="divider-title" style="color: var(--orange);">Gerenciar Dívidas</h3>
            <div class="glass-panel" style="border-top: 3px solid var(--orange);">
                <div class="debt-inputs">
                    <input type="text" id="debt-name" placeholder="Empresa/Pessoa">
                    <input type="number" id="debt-amount" placeholder="Valor Total R$">
                    <input type="number" id="debt-installments" placeholder="Vezes (ex: 12)" title="Quantas parcelas?">
                    <button onclick="addDebt()" style="background:var(--green); border:none; padding:0 15px; border-radius:10px; font-weight:bold; cursor:pointer;">ADICIONAR</button>
                </div>
                <ul class="debt-list" id="debt-list-ui"></ul>
            </div>
        </div>
    </div>

    <script>
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const money_debt = document.getElementById('money-debt');
        const list = document.getElementById('list');
        const debtUi = document.getElementById('debt-list-ui');
        const form = document.getElementById('form');

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let debts = JSON.parse(localStorage.getItem('myDebtsList')) || [];
        let goalData = JSON.parse(localStorage.getItem('myGoal')) || { name: '', target: 0, current: 0 };

        function updateValues() {
            const amounts = transactions.map(t => t.amount);
            const total = amounts.reduce((acc, item) => acc + item, 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => acc + item, 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => acc + item, 0) * -1).toFixed(2);
            const totalDebt = debts.filter(d => !d.paid).reduce((acc, item) => acc + item.amount, 0).toFixed(2);

            balance.innerText = `R$ ${total.replace('.',',')}`;
            money_plus.innerText = `R$ ${income.replace('.',',')}`;
            money_minus.innerText = `R$ ${expense.replace('.',',')}`;
            money_debt.innerText = `R$ ${totalDebt.replace('.',',')}`;
            
            updateGoalUI();
        }

        function addTransaction(e) {
            e.preventDefault();
            const transaction = {
                id: Math.floor(Math.random() * 1000000),
                text: document.getElementById('text').value,
                amount: document.getElementById('type').value === 'minus' ? -Math.abs(document.getElementById('amount').value) : Math.abs(document.getElementById('amount').value),
                date: document.getElementById('date').value
            };
            transactions.push(transaction);
            init();
            form.reset();
        }

        function removeTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            init();
        }

        // FUNÇÃO DE ADICIONAR DÍVIDA COM LÓGICA DE PARCELAS
        function addDebt() {
            const name = document.getElementById('debt-name').value;
            const totalVal = parseFloat(document.getElementById('debt-amount').value);
            const installments = parseInt(document.getElementById('debt-installments').value) || 1;

            if(name && !isNaN(totalVal)) {
                const valPerInstallment = totalVal / installments;

                for(let i = 1; i <= installments; i++) {
                    const debt = {
                        id: Math.floor(Math.random() * 10000000),
                        name: installments > 1 ? `${name} (${i}/${installments})` : name,
                        amount: valPerInstallment,
                        paid: false
                    };
                    debts.push(debt);
                }
                
                saveDebts();
                document.getElementById('debt-name').value = '';
                document.getElementById('debt-amount').value = '';
                document.getElementById('debt-installments').value = '';
            }
        }

        function toggleDebt(id) {
            const debt = debts.find(d => d.id === id);
            if(debt) debt.paid = !debt.paid;
            saveDebts();
        }

        function removeDebt(id) {
            debts = debts.filter(d => d.id !== id);
            saveDebts();
        }

        function saveDebts() {
            localStorage.setItem('myDebtsList', JSON.stringify(debts));
            init();
        }

        function saveGoal() {
            goalData.name = document.getElementById('goal-name').value;
            goalData.target = parseFloat(document.getElementById('goal-target').value) || 0;
            localStorage.setItem('myGoal', JSON.stringify(goalData));
            updateGoalUI();
        }

        function addToGoal() {
            const val = prompt("Quanto deseja guardar?");
            if(val) { goalData.current += parseFloat(val.replace(',','.')); saveGoal(); }
        }

        function updateGoalUI() {
            const pct = (goalData.current / goalData.target) * 100 || 0;
            document.getElementById('goal-bar').style.width = Math.min(pct, 100) + '%';
            document.getElementById('goal-status').innerText = `R$ ${goalData.current.toFixed(2)} / R$ ${goalData.target.toFixed(2)}`;
        }

        function init() {
            list.innerHTML = '';
            transactions.forEach(t => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${t.text}</span> <strong>R$ ${t.amount.toFixed(2)}</strong> <button class="delete-btn" onclick="removeTransaction(${t.id})">x</button>`;
                list.appendChild(li);
            });

            debtUi.innerHTML = '';
            debts.forEach(d => {
                const li = document.createElement('li');
                li.className = `debt-item ${d.paid ? 'pago' : 'pendente'}`;
                li.innerHTML = `<span>${d.name} <br><small style="color:var(--text-muted)">R$ ${d.amount.toFixed(2)}</small></span> <div>
                    <button onclick="toggleDebt(${d.id})" style="border:none; padding:8px; cursor:pointer; border-radius:8px; background:rgba(255,255,255,0.1); color:white;">${d.paid ? '✅ Pago' : '⏳ Pendente'}</button>
                    <button onclick="removeDebt(${d.id})" style="border:none; background:none; color:var(--red); cursor:pointer; margin-left:12px; font-weight:bold;">X</button>
                </div>`;
                debtUi.appendChild(li);
            });

            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateValues();
        }

        form.addEventListener('submit', addTransaction);
        document.getElementById('goal-name').value = goalData.name;
        document.getElementById('goal-target').value = goalData.target;
        init();

        function exportData() {
            const blob = new Blob([JSON.stringify({transactions, debts, goalData})], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_financeiro.json';
            a.click();
        }
    </script>
</body>
</html>
