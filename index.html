<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro - Glass Edition & AI Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f111a;
            --text-color: #e0e0e0;
            --text-muted: #9ba1a6;
            --green: #00e676;
            --red: #ff5252;
            --blue: #03dac6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 15% 50%, #1a1c2c, var(--bg-dark) 50%),
                        radial-gradient(circle at 85% 30%, #15232d, var(--bg-dark) 50%);
            color: var(--text-color); 
            min-height: 100vh;
            padding: 30px;
            overflow-x: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        @media (max-width: 850px) {
            .layout { grid-template-columns: 1fr; }
            .smart-reader-wrapper { position: static; margin-bottom: 20px; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        h2.section-title { font-size: 20px; margin-bottom: 20px; font-weight: 600; }
        form { display: flex; flex-direction: column; gap: 15px; }
        
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: var(--text-color); font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--blue); background: rgba(0,0,0,0.5); }
        
        /* Estilo especial para o campo de arquivo (upload de imagem) */
        input[type="file"] {
            padding: 8px; font-size: 12px; cursor: pointer;
        }
        
        .form-row { display: flex; gap: 10px; }

        .btn-submit { 
            padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
            color: #fff; cursor: pointer; transition: background 0.4s ease, transform 0.2s;
            background-color: var(--red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-submit:active { transform: scale(0.96); }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .summary-card { padding: 20px; text-align: center; }
        .summary-card h4 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .summary-card h2 { font-size: 24px; font-weight: 600; }
        .val-total { color: #fff; }
        .val-plus { color: var(--green); }
        .val-minus { color: var(--red); }

        .list { list-style: none; min-height: 200px; position: relative; }
        .list li {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 15px 25px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out forwards;
            position: relative; overflow: hidden;
        }
        
        .list li.plus::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--green); }
        .list li.minus::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--red); }

        .item-info { display: flex; flex-direction: column; }
        .item-title { font-weight: 600; font-size: 15px; }
        .item-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        
        .delete-btn {
            background: rgba(255, 82, 82, 0.2); border: 1px solid var(--red); color: var(--red);
            border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-weight: bold;
            opacity: 0; transition: 0.3s; position: absolute; right: 20px;
        }
        .list li:hover .delete-btn { opacity: 1; }

        .smart-reader-wrapper { position: absolute; top: 30px; right: 30px; z-index: 100; width: 320px; display: flex; flex-direction: column; align-items: flex-end; }
        
        .btn-reader {
            background: linear-gradient(45deg, var(--blue), #02a89b); color: #000; border: none;
            padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(3, 218, 198, 0.3); display: flex; align-items: center; gap: 8px;
        }
        
        .reader-content {
            width: 100%; max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1), opacity 0.5s;
            opacity: 0; margin-top: 10px;
        }
        /* Aumentei a altura máxima para caber o novo botão de upload */
        .reader-content.show { max-height: 350px; opacity: 1; transition: max-height 0.5s ease-in-out, opacity 0.5s; }
        
        .reader-content textarea { width: 100%; height: 60px; resize: none; margin-bottom: 10px; font-size: 12px; }
        .btn-fill { width: 100%; background: var(--green); color: #000; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Texto de status do carregamento */
        #ocr-status { font-size: 12px; color: var(--blue); text-align: center; margin-top: 10px; font-weight: 600; min-height: 18px; }

        .coin-wrapper { position: fixed; z-index: 9999; pointer-events: none; }
        .coin-anim {
            width: 24px; height: 24px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%; border: 2px solid #fff9c4;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: spin 0.4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotateY(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="smart-reader-wrapper">
        <button class="btn-reader" onclick="toggleReader()">📸 Print Inteligente</button>
        <div class="reader-content glass-panel" id="reader-box">
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--text-muted);">1. Anexe o print da notificação:</p>
            <input type="file" id="image-upload" accept="image/*" />
            
            <p style="font-size: 11px; margin: 10px 0 8px 0; color: var(--text-muted);">2. Ou cole o texto se preferir:</p>
            <textarea id="smart-text" placeholder="Cole o texto aqui..."></textarea>
            
            <button class="btn-fill" id="btn-analyze" onclick="processSmartInput()">Ler e Preencher</button>
            <div id="ocr-status"></div>
        </div>
    </div>

    <div class="layout">
        
        <div class="panel-left glass-panel">
            <h2 class="section-title">Nova Transação</h2>
            <form id="form">
                <input type="text" id="text" placeholder="Descrição (Ex: Uber, Salário)" required />
                
                <div class="form-row">
                    <input type="number" id="amount" placeholder="Valor (R$)" step="0.01" required />
                    <input type="date" id="date" required />
                </div>

                <div class="form-row">
                    <select id="type">
                        <option value="minus">Saída (-)</option>
                        <option value="plus">Entrada (+)</option>
                    </select>
                    <select id="installments">
                        <option value="1">1 Parcela (À vista)</option>
                        <option value="2">2 Parcelas</option>
                        <option value="3">3 Parcelas</option>
                        <option value="4">4 Parcelas</option>
                        <option value="5">5 Parcelas</option>
                        <option value="6">6 Parcelas</option>
                        <option value="10">10 Parcelas</option>
                        <option value="12">12 Parcelas</option>
                    </select>
                </div>

                <select id="payment-method">
                    <option value="Pix/Dinheiro">Dinheiro / Pix</option>
                    <option value="Débito">Cartão de Débito</option>
                    <option value="Crédito">Cartão de Crédito</option>
                </select>

                <select id="debt-to">
                    <option value="Nenhum">Dívida com alguém?</option>
                    <option value="Michele">Devo para: Michele</option>
                    <option value="Andressa">Devo para: Andressa</option>
                </select>

                <button type="submit" class="btn-submit" id="submit-btn">Adicionar Transação</button>
            </form>
        </div>

        <div class="panel-center">
            <div class="summary-grid">
                <div class="summary-card glass-panel">
                    <h4>Saldo Atual</h4>
                    <h2 id="balance" class="val-total">R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Entradas</h4>
                    <h2 id="money-plus" class="val-plus">+ R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Saídas</h4>
                    <h2 id="money-minus" class="val-minus">- R$ 0,00</h2>
                </div>
            </div>

            <div class="glass-panel" style="min-height: 400px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h2 class="section-title">Histórico de Transações</h2>
                    <select id="month-filter" style="width: 150px; background: rgba(0,0,0,0.5);">
                        <option value="all">Todos</option>
                        <option value="01">Jan</option>
                        <option value="02">Fev</option>
                        <option value="03" selected>Mar</option>
                        <option value="04">Abr</option>
                        <option value="05">Mai</option>
                        <option value="06">Jun</option>
                        <option value="07">Jul</option>
                        <option value="08">Ago</option>
                        <option value="09">Set</option>
                        <option value="10">Out</option>
                        <option value="11">Nov</option>
                        <option value="12">Dez</option>
                    </select>
                </div>
                
                <ul id="list" class="list"></ul>
            </div>
        </div>

    </div>

    <script>
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');
        const submitBtn = document.getElementById('submit-btn');
        const monthFilter = document.getElementById('month-filter');

        function updateButtonColor() {
            if (typeInput.value === 'plus') {
                submitBtn.style.backgroundColor = 'var(--green)';
                submitBtn.style.color = '#000';
            } else {
                submitBtn.style.backgroundColor = 'var(--red)';
                submitBtn.style.color = '#fff';
            }
        }
        typeInput.addEventListener('change', updateButtonColor);
        updateButtonColor();

        function toggleReader() {
            document.getElementById('reader-box').classList.toggle('show');
        }

        document.getElementById('date').valueAsDate = new Date();
        monthFilter.value = String(new Date().getMonth() + 1).padStart(2, '0');

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // === NOVA LÓGICA DO LEITOR DE IMAGEM (OCR) ===
        async function processSmartInput() {
            const fileInput = document.getElementById('image-upload');
            const textArea = document.getElementById('smart-text');
            const statusDiv = document.getElementById('ocr-status');
            const btn = document.getElementById('btn-analyze');

            // Se o usuário selecionou uma imagem
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                // Feedback visual pois a leitura demora alguns segundos
                statusDiv.innerText = "Lendo a imagem... Aguarde ⏳";
                statusDiv.style.color = "var(--green)";
                btn.disabled = true;
                btn.style.opacity = '0.5';

                try {
                    // Chama a IA para ler a imagem em Português (por)
                    const result = await Tesseract.recognize(file, 'por');
                    const textExtracted = result.data.text;
                    
                    // Coloca o texto lido na caixinha para o usuário ver
                    textArea.value = textExtracted;
                    
                    // Manda o texto para a nossa função que preenche os campos
                    analyzeText(textExtracted);
                    
                    statusDiv.innerText = "Sucesso! 🎉";
                    fileInput.value = ""; // Limpa o input de arquivo
                } catch (error) {
                    console.error(error);
                    statusDiv.innerText = "Erro ao ler a imagem. Tente uma mais nítida.";
                    statusDiv.style.color = "var(--red)";
                } finally {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    setTimeout(() => statusDiv.innerText = "", 4000);
                }
            } 
            // Se não tem imagem, mas tem texto colado na caixa
            else if (textArea.value.trim() !== '') {
                analyzeText(textArea.value);
                toggleReader(); // Recolhe a gaveta
            } 
            // Se não tem nada
            else {
                statusDiv.innerText = "Insira um print ou cole o texto!";
                statusDiv.style.color = "var(--red)";
                setTimeout(() => statusDiv.innerText = "", 3000);
            }
        }

        // Função que analisa o texto (seja vindo da imagem ou colado)
        function analyzeText(rawText) {
            const smartText = rawText.toLowerCase();

            // Tenta achar o valor numérico
            const valueMatch = smartText.match(/r\$\s*(\d+[.,]\d+)/) || smartText.match(/(\d+[.,]\d+)/);
            if(valueMatch) amountInput.value = parseFloat(valueMatch[1].replace(',', '.'));

            // Tenta achar o método
            if(smartText.includes('crédito') || smartText.includes('credito') || smartText.includes('nubank')) {
                document.getElementById('payment-method').value = 'Crédito';
                typeInput.value = 'minus';
            } else if(smartText.includes('débito') || smartText.includes('debito')) {
                document.getElementById('payment-method').value = 'Débito';
                typeInput.value = 'minus';
            } else if(smartText.includes('pix') || smartText.includes('transferência enviada')) {
                document.getElementById('payment-method').value = 'Pix/Dinheiro';
                typeInput.value = 'minus';
            } else if(smartText.includes('recebid') || smartText.includes('transferência recebida')) {
                typeInput.value = 'plus';
            }

            // Tenta achar o nome do local/pessoa (O que vem depois de "em " ou "para ")
            const nameMatch = smartText.match(/(?:em|para)\s+([a-záéíóúãõç\s]+)/i);
            textInput.value = nameMatch ? nameMatch[1].trim().substring(0, 20) : "Auto Leitura da Imagem";
            
            updateButtonColor();
        }

        // === ANIMAÇÃO E SALVAMENTO ===
        function animateCoinAndSave(transactionDataArr) {
            const wrapper = document.createElement('div');
            wrapper.className = 'coin-wrapper';
            
            const coin = document.createElement('div');
            coin.className = 'coin-anim';
            wrapper.appendChild(coin);
            
            const btnRect = submitBtn.getBoundingClientRect();
            const startX = btnRect.left + (btnRect.width / 2) - 12;
            const startY = btnRect.top + (btnRect.height / 2) - 12;
            
            wrapper.style.left = startX + 'px';
            wrapper.style.top = startY + 'px';
            document.body.appendChild(wrapper);

            const listRect = list.getBoundingClientRect();
            const destX = listRect.left + 50; 
            const destY = listRect.top > 0 ? listRect.top + 30 : window.innerHeight / 2;

            setTimeout(() => {
                wrapper.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s';
                wrapper.style.transform = `translate(${destX - startX}px, ${destY - startY}px) scale(0.5)`;
                wrapper.style.opacity = '0.3';
            }, 10);

            setTimeout(() => {
                wrapper.remove();
                transactions.push(...transactionDataArr);
                updateLocalStorage();
                init();
            }, 610);
        }

        function addTransaction(e) {
            e.preventDefault();
            let totalAmount = parseFloat(amountInput.value);
            let numInstallments = parseInt(document.getElementById('installments').value);
            let isMinus = typeInput.value === 'minus';
            totalAmount = isMinus ? -Math.abs(totalAmount) : Math.abs(totalAmount);
            let installmentAmount = totalAmount / numInstallments;
            
            let dateParts = document.getElementById('date').value.split('-');
            let year = parseInt(dateParts[0]), month = parseInt(dateParts[1]) - 1, day = parseInt(dateParts[2]);

            let newTransactions = [];
            for(let i = 0; i < numInstallments; i++) {
                let tempDate = new Date(year, month + i, day);
                let formattedDate = `${tempDate.getFullYear()}-${String(tempDate.getMonth() + 1).padStart(2, '0')}-${String(tempDate.getDate()).padStart(2, '0')}`;
                let textSuffix = numInstallments > 1 ? ` (${i+1}/${numInstallments})` : '';

                newTransactions.push({
                    id: Math.floor(Math.random() * 100000000),
                    text: textInput.value + textSuffix,
                    amount: installmentAmount,
                    date: formattedDate,
                    method: document.getElementById('payment-method').value,
                    debt: document.getElementById('debt-to').value
                });
            }
            animateCoinAndSave(newTransactions);
            textInput.value = '';
            amountInput.value = '';
            document.getElementById('installments').value = '1';
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
            
            let debtBadge = transaction.debt !== 'Nenhum' ? ` | Dívida: ${transaction.debt}` : '';
            const dateBR = transaction.date.split('-').reverse().join('/');

            item.innerHTML = `
                <div class="item-info">
                    <span class="item-title">${transaction.text}</span>
                    <span class="item-date">${transaction.method}${debtBadge} • ${dateBR}</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span style="font-weight:600; font-size:16px;">${sign} R$ ${Math.abs(transaction.amount).toFixed(2).replace('.', ',')}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">X</button>
                </div>
            `;
            list.appendChild(item);
        }

        function updateValues(filtered) {
            const amounts = filtered.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            balance.innerText = `R$ ${total.replace('.', ',')}`;
            money_plus.innerText = `+ R$ ${income.replace('.', ',')}`;
            money_minus.innerText = `- R$ ${expense.replace('.', ',')}`;
        }

        function removeTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateLocalStorage();
            init();
        }

        function updateLocalStorage() { localStorage.setItem('transactions', JSON.stringify(transactions)); }

        function init() {
            list.innerHTML = '';
            const selMonth = monthFilter.value;
            const filtered = selMonth === 'all' ? transactions : transactions.filter(t => t.date.split('-')[1] === selMonth);
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            filtered.forEach(addTransactionDOM);
            updateValues(filtered);
        }

        monthFilter.addEventListener('change', init);
        form.addEventListener('submit', addTransaction);

        init();
    </script>
</body>
</html>
