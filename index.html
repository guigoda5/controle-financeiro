<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guigo da 5 - Finanças Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f111a;
            --text-color: #e0e0e0;
            --text-muted: #9ba1a6;
            --green: #00e676;
            --red: #ff5252;
            --blue: #03dac6;
            --orange: #ff9800;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 15% 50%, #1a1c2c, var(--bg-dark) 50%),
                        radial-gradient(circle at 85% 30%, #15232d, var(--bg-dark) 50%);
            color: var(--text-color); min-height: 100vh; padding: 20px 30px; overflow-x: hidden;
        }

        /* Cabeçalho e Backup */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .main-title {
            font-size: 32px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(45deg, var(--blue), var(--green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(3, 218, 198, 0.2);
        }
        .backup-controls { display: flex; gap: 10px; }
        .btn-small {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: var(--text-color); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-small:hover { background: rgba(255,255,255,0.1); border-color: var(--blue); }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; position: relative; }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .smart-reader-wrapper { position: static; margin-bottom: 20px; width: 100%; }
            .top-nav { flex-direction: column; gap: 15px; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 25px; position: relative; overflow: hidden;
        }
        .glass-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        h2.section-title { font-size: 18px; margin-bottom: 20px; font-weight: 600; color: var(--blue); }
        
        /* Formulário */
        form { display: flex; flex-direction: column; gap: 12px; }
        input, select, textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: var(--text-color); font-size: 13px; outline: none; transition: 0.3s; -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--blue); background: rgba(0,0,0,0.5); }
        .form-row { display: flex; gap: 10px; }
        .btn-submit { 
            padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; 
            color: #fff; cursor: pointer; transition: 0.3s; background-color: var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-submit:active { transform: scale(0.96); }

        /* Resumo em 4 Cartões */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
        .summary-card { padding: 15px; text-align: center; }
        .summary-card h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .summary-card h2 { font-size: 20px; font-weight: 600; }
        .val-total { color: #fff; } .val-plus { color: var(--green); } .val-minus { color: var(--red); } .val-debt { color: var(--orange); }

        /* Metas e Caixinhas (Neon) */
        .goals-panel { margin-bottom: 25px; padding: 20px; border-left: 4px solid var(--blue); }
        .goals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .goal-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .goal-inputs input { padding: 8px; font-size: 12px; }
        .progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 12px; overflow: hidden; position: relative; border: 1px solid var(--glass-border); }
        .progress-bar { 
            height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); 
            width: 0%; transition: width 0.8s ease-in-out;
            box-shadow: 0 0 10px var(--green);
        }
        .goal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; }
        .btn-add-goal { background: var(--blue); color: #000; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Lista Histórico */
        .list { list-style: none; min-height: 200px; position: relative; }
        .list li {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.2); animation: fadeIn 0.5s ease-out forwards;
        }
        .list li.plus { border-left: 4px solid var(--green); }
        .list li.minus { border-left: 4px solid var(--red); }
        .item-info { display: flex; flex-direction: column; }
        .item-title { font-weight: 600; font-size: 14px; }
        .item-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 6px; align-items: center; }
        .badge { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; font-size: 10px; border: 1px solid var(--glass-border); }
        .delete-btn { background: rgba(255, 82, 82, 0.2); border: 1px solid var(--red); color: var(--red); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; margin-left: 10px; }
        .delete-btn:hover { background: var(--red); color: #fff; }

        /* Leitor Inteligente */
        .smart-reader-wrapper { position: absolute; top: 20px; right: 30px; z-index: 100; width: 320px; display: flex; flex-direction: column; align-items: flex-end; }
        .btn-reader { background: linear-gradient(45deg, var(--blue), #02a89b); color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(3, 218, 198, 0.3); }
        .reader-content { width: 100%; max-height: 0; overflow: hidden; transition: max-height 0.5s, opacity 0.5s; opacity: 0; margin-top: 10px; }
        .reader-content.show { max-height: 450px; opacity: 1; }
        .custom-file-upload { display: block; width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px dashed var(--glass-border); border-radius: 10px; color: var(--text-muted); text-align: center; cursor: pointer; font-size: 12px; margin-bottom: 5px; }
        .reader-content textarea { height: 60px; }
        .btn-fill { width: 100%; background: var(--green); color: #000; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .coin-wrapper { position: fixed; z-index: 9999; pointer-events: none; }
        .coin-anim { width: 20px; height: 20px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; border: 2px solid #fff9c4; animation: spin 0.4s linear infinite; }
        @keyframes spin { 100% { transform: rotateY(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header class="top-nav">
        <h1 class="main-title">Guigo da 5</h1>
        <div class="backup-controls">
            <button class="btn-small" onclick="exportData()">💾 Salvar Backup</button>
            <button class="btn-small" onclick="document.getElementById('import-file').click()">📂 Restaurar</button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
        </div>
    </header>

    <div class="smart-reader-wrapper">
        <button class="btn-reader" onclick="toggleReader()">📸 Print Inteligente</button>
        <div class="reader-content glass-panel" id="reader-box">
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--text-muted);">1. Anexe o print da notificação:</p>
            <label for="image-upload" class="custom-file-upload">📁 Escolher imagem</label>
            <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="updateFileName(this)" />
            <span id="file-name-display" style="font-size: 10px; color: var(--blue); text-align: center; display: block; margin-bottom: 10px;"></span>
            
            <p style="font-size: 11px; margin: 5px 0 8px 0; color: var(--text-muted);">2. Ou cole o texto:</p>
            <textarea id="smart-text" placeholder="Cole aqui..."></textarea>
            
            <button class="btn-fill" id="btn-analyze" onclick="processSmartInput()">Ler e Preencher</button>
            <div id="ocr-status" style="font-size: 11px; color: var(--blue); text-align: center; margin-top: 10px; min-height: 15px;"></div>
        </div>
    </div>

    <div class="layout">
        
        <div class="panel-left glass-panel">
            <h2 class="section-title">Nova Transação</h2>
            <form id="form">
                <input type="text" id="text" placeholder="Descrição rápida..." required />
                
                <div class="form-row">
                    <input type="number" id="amount" placeholder="Valor (R$)" step="0.01" required />
                    <input type="date" id="date" required />
                </div>

                <select id="category" required>
                    <option value="" disabled selected>Escolha uma Categoria...</option>
                    <option value="🏠 Despesas Fixas (Casa)">🏠 Despesas Fixas (Casa)</option>
                    <option value="🚗 Carro (Argo)">🚗 Carro (Argo)</option>
                    <option value="🍻 Saídas e Encontros">🍻 Saídas e Encontros</option>
                    <option value="🎮 Lazer (Jogos/Futebol)">🎮 Lazer (Jogos/Futebol)</option>
                    <option value="🛒 Supermercado">🛒 Supermercado</option>
                    <option value="💼 Salário / Renda">💼 Salário / Renda</option>
                    <option value="💸 Outros">💸 Outros</option>
                </select>

                <div class="form-row">
                    <select id="type">
                        <option value="minus">Saída (-)</option>
                        <option value="plus">Entrada (+)</option>
                    </select>
                    <select id="installments">
                        <option value="1">À vista (1x)</option>
                        <option value="2">2 Parcelas</option>
                        <option value="3">3 Parcelas</option>
                        <option value="4">4 Parcelas</option>
                        <option value="5">5 Parcelas</option>
                        <option value="6">6 Parcelas</option>
                        <option value="12">12 Parcelas</option>
                    </select>
                </div>

                <div class="form-row">
                    <select id="payment-method">
                        <option value="Pix/Dinheiro">Pix / Dinheiro</option>
                        <option value="Débito">Débito</option>
                        <option value="Crédito">Crédito</option>
                    </select>
                    <select id="debt-to">
                        <option value="Nenhum">Dívida?</option>
                        <option value="Michele">Michele</option>
                        <option value="Andressa">Andressa</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Adicionar</button>
            </form>
        </div>

        <div class="panel-center">
            
            <div class="summary-grid">
                <div class="summary-card glass-panel">
                    <h4>Saldo Total</h4>
                    <h2 id="balance" class="val-total">R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Entradas</h4>
                    <h2 id="money-plus" class="val-plus">+ R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Saídas</h4>
                    <h2 id="money-minus" class="val-minus">- R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel" style="border-bottom: 3px solid var(--orange);">
                    <h4>Total Devido</h4>
                    <h2 id="money-debt" class="val-debt">R$ 0,00</h2>
                </div>
            </div>

            <div class="goals-panel glass-panel">
                <div class="goals-header">
                    <h2 class="section-title" style="margin:0;">🎯 Caixinha / Meta</h2>
                </div>
                <div class="goal-inputs">
                    <input type="text" id="goal-name" placeholder="Nome da Meta" value="Reserva: Upgrade Positivo SIM+" onchange="saveGoal()">
                    <input type="number" id="goal-target" placeholder="Meta R$" value="3500" onchange="saveGoal()">
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="goal-bar"></div>
                </div>
                <div class="goal-actions">
                    <span id="goal-status">Guardado: R$ 0,00 / R$ 3500,00</span>
                    <button class="btn-add-goal" onclick="addToGoal()">+ Guardar R$</button>
                </div>
            </div>

            <div class="glass-panel" style="min-height: 300px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h2 class="section-title" style="margin:0;">Histórico</h2>
                    <select id="month-filter" style="width: 120px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; color: #fff;">
                        <option value="all">Todos</option>
                        <option value="01">Jan</option> <option value="02">Fev</option> <option value="03" selected>Mar</option>
                        <option value="04">Abr</option> <option value="05">Mai</option> <option value="06">Jun</option>
                        <option value="07">Jul</option> <option value="08">Ago</option> <option value="09">Set</option>
                        <option value="10">Out</option> <option value="11">Nov</option> <option value="12">Dez</option>
                    </select>
                </div>
                <ul id="list" class="list"></ul>
            </div>
        </div>

    </div>

    <script>
        // Variáveis DOM
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const money_debt = document.getElementById('money-debt');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');
        const categoryInput = document.getElementById('category');
        const submitBtn = document.getElementById('submit-btn');
        const monthFilter = document.getElementById('month-filter');

        // Configuração de Data e Cor Inicial
        document.getElementById('date').valueAsDate = new Date();
        monthFilter.value = String(new Date().getMonth() + 1).padStart(2, '0');

        function updateButtonColor() {
            if (typeInput.value === 'plus') { submitBtn.style.backgroundColor = 'var(--green)'; submitBtn.style.color = '#000'; } 
            else { submitBtn.style.backgroundColor = 'var(--red)'; submitBtn.style.color = '#fff'; }
        }
        typeInput.addEventListener('change', updateButtonColor);
        updateButtonColor();

        // Leitor Retrátil
        function toggleReader() { document.getElementById('reader-box').classList.toggle('show'); }
        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if(input.files && input.files[0]) display.innerText = "Imagem pronta para leitura!";
            else display.innerText = "";
        }

        // --- SISTEMA DE DADOS ---
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        
        // Caixinhas/Metas
        let goalData = JSON.parse(localStorage.getItem('myGoal')) || { name: 'Reserva: Upgrade Positivo SIM+', target: 3500, current: 0 };
        document.getElementById('goal-name').value = goalData.name;
        document.getElementById('goal-target').value = goalData.target;
        
        function saveGoal() {
            goalData.name = document.getElementById('goal-name').value || 'Minha Meta';
            goalData.target = parseFloat(document.getElementById('goal-target').value) || 1;
            updateGoalUI();
            localStorage.setItem('myGoal', JSON.stringify(goalData));
        }

        function addToGoal() {
            let addVal = prompt("Quanto você quer depositar na caixinha?");
            if(addVal && !isNaN(addVal)) {
                goalData.current += parseFloat(addVal.replace(',','.'));
                saveGoal();
                alert("Valor guardado na caixinha!");
            }
        }

        function updateGoalUI() {
            let pct = (goalData.current / goalData.target) * 100;
            if(pct > 100) pct = 100;
            document.getElementById('goal-bar').style.width = pct + '%';
            document.getElementById('goal-status').innerText = `Guardado: R$ ${goalData.current.toFixed(2).replace('.',',')} / R$ ${goalData.target.toFixed(2).replace('.',',')}`;
        }

        // --- BACKUP ---
        function exportData() {
            const dataStr = JSON.stringify({ transactions, goalData });
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url; link.download = 'backup_financas_guigo.json';
            link.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.transactions) transactions = imported.transactions;
                    if(imported.goalData) goalData = imported.goalData;
                    updateLocalStorage(); saveGoal(); init();
                    alert("Backup restaurado com sucesso!");
                } catch(err) { alert("Erro ao ler o arquivo de backup."); }
            };
            reader.readAsText(file);
        }

        // --- LEITOR INTELIGENTE (OCR) ---
        async function processSmartInput() {
            const fileInput = document.getElementById('image-upload');
            const textArea = document.getElementById('smart-text');
            const statusDiv = document.getElementById('ocr-status');
            const btn = document.getElementById('btn-analyze');

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                statusDiv.innerText = "Lendo imagem... ⏳"; btn.disabled = true;
                try {
                    const result = await Tesseract.recognize(file, 'por');
                    textArea.value = result.data.text;
                    analyzeText(result.data.text);
                    statusDiv.innerText = "Lido com sucesso!";
                    fileInput.value = ""; updateFileName(fileInput);
                } catch (error) { statusDiv.innerText = "Erro na leitura."; } 
                finally { btn.disabled = false; setTimeout(() => statusDiv.innerText = "", 3000); }
            } else if (textArea.value.trim() !== '') {
                analyzeText(textArea.value); toggleReader(); 
            } else { statusDiv.innerText = "Insira a imagem ou texto!"; setTimeout(() => statusDiv.innerText = "", 2000); }
        }

        function analyzeText(rawText) {
            const smartText = rawText.toLowerCase();
            const valueMatch = smartText.match(/r\$\s*(\d+[.,]\d+)/) || smartText.match(/(\d+[.,]\d+)/);
            if(valueMatch) amountInput.value = parseFloat(valueMatch[1].replace(',', '.'));

            if(smartText.includes('crédito') || smartText.includes('credito')) {
                document.getElementById('payment-method').value = 'Crédito'; typeInput.value = 'minus';
            } else if(smartText.includes('débito') || smartText.includes('debito')) {
                document.getElementById('payment-method').value = 'Débito'; typeInput.value = 'minus';
            } else if(smartText.includes('pix') || smartText.includes('enviad')) {
                document.getElementById('payment-method').value = 'Pix/Dinheiro'; typeInput.value = 'minus';
            } else if(smartText.includes('recebid')) { typeInput.value = 'plus'; }

            const nameMatch = smartText.match(/(?:em|para)\s+([a-záéíóúãõç\s]+)/i);
            textInput.value = nameMatch ? nameMatch[1].trim().substring(0, 15) : "Auto Leitura";
            updateButtonColor();
        }

        // --- TRANSAÇÕES ---
        function animateCoinAndSave(transactionDataArr) {
            const wrapper = document.createElement('div'); wrapper.className = 'coin-wrapper';
            const coin = document.createElement('div'); coin.className = 'coin-anim'; wrapper.appendChild(coin);
            
            const btnRect = submitBtn.getBoundingClientRect();
            wrapper.style.left = (btnRect.left + btnRect.width/2 - 10) + 'px';
            wrapper.style.top = (btnRect.top + btnRect.height/2 - 10) + 'px';
            document.body.appendChild(wrapper);

            const listRect = list.getBoundingClientRect();
            const destX = listRect.left + 30; const destY = listRect.top > 0 ? listRect.top + 20 : window.innerHeight / 2;

            setTimeout(() => {
                wrapper.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s';
                wrapper.style.transform = `translate(${destX - parseFloat(wrapper.style.left)}px, ${destY - parseFloat(wrapper.style.top)}px) scale(0.5)`;
                wrapper.style.opacity = '0.2';
            }, 10);

            setTimeout(() => {
                wrapper.remove();
                transactions.push(...transactionDataArr);
                updateLocalStorage(); init();
            }, 510);
        }

        function addTransaction(e) {
            e.preventDefault();
            let totalAmount = parseFloat(amountInput.value);
            let numInstallments = parseInt(document.getElementById('installments').value);
            totalAmount = typeInput.value === 'minus' ? -Math.abs(totalAmount) : Math.abs(totalAmount);
            let installmentAmount = totalAmount / numInstallments;
            
            let dateParts = document.getElementById('date').value.split('-');
            let year = parseInt(dateParts[0]), month = parseInt(dateParts[1]) - 1, day = parseInt(dateParts[2]);

            let newTransactions = [];
            for(let i = 0; i < numInstallments; i++) {
                let tempDate = new Date(year, month + i, day);
                let formattedDate = `${tempDate.getFullYear()}-${String(tempDate.getMonth() + 1).padStart(2, '0')}-${String(tempDate.getDate()).padStart(2, '0')}`;
                let textSuffix = numInstallments > 1 ? ` (${i+1}/${numInstallments})` : '';

                newTransactions.push({
                    id: Math.floor(Math.random() * 100000000),
                    text: textInput.value + textSuffix,
                    amount: installmentAmount,
                    date: formattedDate,
                    category: categoryInput.value || '💸 Outros',
                    method: document.getElementById('payment-method').value,
                    debt: document.getElementById('debt-to').value
                });
            }
            animateCoinAndSave(newTransactions);
            
            // Limpa form
            textInput.value = ''; amountInput.value = ''; 
            document.getElementById('installments').value = '1'; categoryInput.value = '';
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
            
            let debtBadge = transaction.debt !== 'Nenhum' ? `<span class="badge" style="color:var(--orange);border-color:var(--orange)">Dívida: ${transaction.debt}</span>` : '';
            const dateBR = transaction.date.split('-').reverse().join('/');
            
            // Pega só o ícone da categoria (primeiro caractere) para ficar mais limpo
            let catIcon = transaction.category ? transaction.category.charAt(0) : '💸';

            item.innerHTML = `
                <div class="item-info">
                    <span class="item-title">${catIcon} ${transaction.text}</span>
                    <span class="item-meta"><span class="badge">${transaction.method}</span> ${debtBadge} • ${dateBR}</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span style="font-weight:600; font-size:15px;">${sign} R$ ${Math.abs(transaction.amount).toFixed(2).replace('.', ',')}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">X</button>
                </div>
            `;
            list.appendChild(item);
        }

        function updateValues(filtered) {
            const amounts = filtered.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);
            
            // Filtro exclusivo para Dívidas Ativas (Pega de todas as transações, não só do mês)
            const totalDebt = transactions.filter(t => t.debt !== 'Nenhum' && t.amount < 0).map(t => t.amount).reduce((acc, item) => (acc += item), 0) * -1;

            balance.innerText = `R$ ${total.replace('.', ',')}`;
            money_plus.innerText = `+ R$ ${income.replace('.', ',')}`;
            money_minus.innerText = `- R$ ${expense.replace('.', ',')}`;
            money_debt.innerText = `R$ ${totalDebt.toFixed(2).replace('.', ',')}`;
        }

        function removeTransaction(id) { transactions = transactions.filter(t => t.id !== id); updateLocalStorage(); init(); }
        function updateLocalStorage() { localStorage.setItem('transactions', JSON.stringify(transactions)); }

        function init() {
            list.innerHTML = '';
            const selMonth = monthFilter.value;
            const filtered = selMonth === 'all' ? transactions : transactions.filter(t => t.date.split('-')[1] === selMonth);
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            filtered.forEach(addTransactionDOM);
            updateValues(filtered);
            updateGoalUI();
        }

        monthFilter.addEventListener('change', init);
        form.addEventListener('submit', addTransaction);

        init();
    </script>
</body>
</html>
