<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guigo da 5 - Finanças Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a;
            --text-color: #e0e0e0;
            --text-muted: #9ba1a6;
            --green: #00e676;
            --red: #ff5252;
            --blue: #03dac6;
            --orange: #ff9800;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 15% 50%, #1a1c2c, var(--bg-dark) 50%),
                        radial-gradient(circle at 85% 30%, #15232d, var(--bg-dark) 50%);
            color: var(--text-color); min-height: 100vh; padding: 20px 30px; overflow-x: hidden;
        }

        /* --- CABEÇALHO E TOP NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px; position: relative; z-index: 1000; 
        }
        .header-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .main-title { 
            font-size: 32px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
            background: linear-gradient(45deg, var(--blue), var(--green)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-shadow: 0 4px 20px rgba(3, 218, 198, 0.2); margin: 0; 
        }
        .backup-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-small { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: var(--text-color); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; 
        }
        .btn-small:hover { background: rgba(255,255,255,0.1); border-color: var(--blue); }

        /* --- LAYOUT PRINCIPAL --- */
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; position: relative; }

        .glass-panel { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 25px; position: relative; overflow: hidden; 
        }
        .glass-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); }

        h2.section-title { font-size: 18px; margin-bottom: 20px; font-weight: 600; color: var(--blue); }
        
        /* --- FORMULÁRIO E GAVETAS --- */
        form { display: flex; flex-direction: column; gap: 12px; }
        
        form input { 
            width: 100%; padding: 14px 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: var(--text-color); font-size: 14px; outline: none; transition: 0.3s; 
            -webkit-appearance: none; 
        }
        
        form select { 
            width: 100%; padding: 14px 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: var(--text-color); font-size: 14px; outline: none; transition: 0.3s; 
            cursor: pointer;
        }
        
        select option { background: #1a1c2c; color: #fff; padding: 10px; }

        form input:focus, form select:focus { border-color: var(--blue); background: rgba(0,0,0,0.6); }
        
        .form-row { display: flex; gap: 10px; }
        .btn-submit { padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer; transition: 0.3s; background-color: var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-submit:active { transform: scale(0.96); }

        /* --- RESUMO EM BLOCOS --- */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .summary-card { padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .summary-card h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .summary-card h2 { font-size: 18px; font-weight: 600; margin: 0; word-break: break-word; }
        .val-total { color: #fff; } .val-plus { color: var(--green); } .val-minus { color: var(--red); } .val-debt { color: var(--orange); }

        /* --- METAS --- */
        .goals-panel { margin-bottom: 25px; padding: 20px; border-left: 4px solid var(--blue); }
        .goals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;}
        .goal-inputs { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .goal-inputs input { width: 100%; padding: 10px; font-size: 13px; flex: 1; min-width: 120px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-color); outline: none;}
        .progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 14px; overflow: hidden; position: relative; border: 1px solid var(--glass-border); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); width: 0%; transition: width 0.8s ease-in-out; box-shadow: 0 0 10px var(--green); }
        .goal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 12px; flex-wrap: wrap; gap: 10px; }
        .btn-add-goal { background: var(--blue); color: #000; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        .goal-history-list { list-style: none; margin-top: 15px; max-height: 120px; overflow-y: auto; }
        .goal-history-list::-webkit-scrollbar { width: 6px; }
        .goal-history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .goal-history-list li { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }
        .goal-val { color: var(--green); font-weight: 600; }

        /* --- DÍVIDAS (NOVO PAINEL) --- */
        .debts-wrapper { max-width: 1200px; margin: 20px auto; }
        
        /* NOVO RESUMO EXCLUSIVO PARA EMPRESAS */
        .company-debt-summary { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--orange); 
            border-radius: 15px; padding: 15px 20px; margin-bottom: 20px;
            display: inline-block; /* Fica do tamanho do texto */
            border-left: 4px solid var(--orange);
        }
        .company-debt-summary h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .company-debt-summary h2 { font-size: 20px; font-weight: 600; margin: 0; color: var(--orange); }

        .debts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .debt-card { background: rgba(0,0,0,0.3); border: 1px solid var(--orange); border-radius: 15px; padding: 15px; position: relative; }
        .debt-card.finished { border-color: var(--green); opacity: 0.7; }
        .debt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .debt-company { font-weight: 600; font-size: 16px; color: #fff; }
        .debt-details { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
        .debt-progress-container { width: 100%; background: rgba(0,0,0,0.6); border-radius: 5px; height: 8px; overflow: hidden; margin-bottom: 10px; }
        .debt-progress-bar { height: 100%; background: var(--orange); transition: width 0.5s ease; }
        .debt-card.finished .debt-progress-bar { background: var(--green); }
        .debt-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-pay-debt { flex: 1; background: var(--green); color: #000; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-pay-debt:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        /* --- HISTÓRICO PRINCIPAL --- */
        .list { list-style: none; min-height: 150px; position: relative; }
        .list li { background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.2); animation: fadeIn 0.5s ease-out forwards; }
        .list li.plus { border-left: 4px solid var(--green); }
        .list li.minus { border-left: 4px solid var(--red); }
        .item-info { display: flex; flex-direction: column; width: 65%; }
        .item-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .badge { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; font-size: 10px; border: 1px solid var(--glass-border); }
        
        .item-actions { display: flex; align-items: center; gap: 10px; }
        .delete-btn { background: rgba(255, 82, 82, 0.2); border: 1px solid var(--red); color: var(--red); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; font-size: 12px; flex-shrink: 0; }
        .delete-btn:active { background: var(--red); color: #fff; transform: scale(0.9); }

        .coin-wrapper { position: fixed; z-index: 9999; pointer-events: none; }
        .coin-anim { width: 20px; height: 20px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; border: 2px solid #fff9c4; animation: spin 0.4s linear infinite; }

        /* Ajustes Mobile */
        @media (max-width: 900px) {
            body { padding: 15px 10px; }
            .top-nav { flex-direction: column; justify-content: center; text-align: center; }
            .header-left { flex-direction: column; gap: 10px; justify-content: center; }
            .layout { grid-template-columns: 1fr; gap: 20px; }
            .glass-panel { padding: 18px; }
            .summary-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .form-row { flex-direction: column; gap: 12px; }
            .company-debt-summary { width: 100%; text-align: center; }
        }

        @keyframes spin { 100% { transform: rotateY(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header class="top-nav">
        <div class="header-left">
            <h1 class="main-title">Guigo da 5</h1>
            <div class="backup-controls">
                <button class="btn-small" onclick="exportData()">💾 Salvar Backup</button>
                <button class="btn-small" onclick="document.getElementById('import-file').click()">📂 Restaurar</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>

    <div class="layout">
        
        <div class="panel-left glass-panel">
            <h2 class="section-title">Nova Transação</h2>
            <form id="form">
                <input type="text" id="text" placeholder="Descrição rápida..." required />
                
                <div class="form-row">
                    <input type="number" id="amount" placeholder="Valor (R$)" step="0.01" required />
                    <input type="date" id="date" required />
                </div>

                <select id="category" required>
                    <option value="" disabled selected>Categorias</option>
                    <option value="Casa">🏠 Despesas Fixas</option>
                    <option value="Carro">🚗 Carro</option>
                    <option value="Saidas">🍻 Saídas e Encontros</option>
                    <option value="Lazer">🎮 Lazer</option>
                    <option value="Supermercado">🛒 Supermercado</option>
                    <option value="Salario">💼 Salário / Renda</option>
                    <option value="Outros">💸 Outros</option>
                </select>

                <div class="form-row">
                    <select id="type">
                        <option value="minus">Saída (-)</option>
                        <option value="plus">Entrada (+)</option>
                    </select>
                    <select id="installments">
                        <option value="1">À vista (1x)</option>
                        <option value="2">2 Parcelas</option>
                        <option value="3">3 Parcelas</option>
                        <option value="4">4 Parcelas</option>
                        <option value="5">5 Parcelas</option>
                        <option value="6">6 Parcelas</option>
                        <option value="12">12 Parcelas</option>
                    </select>
                </div>

                <div class="form-row">
                    <select id="payment-method">
                        <option value="Pix/Dinheiro">Pix / Dinheiro</option>
                        <option value="Débito">Débito</option>
                        <option value="Crédito">Crédito</option>
                    </select>
                    <select id="debt-to">
                        <option value="Nenhum">Dívida Amigos?</option>
                        <option value="Michele">Michele</option>
                        <option value="Andressa">Andressa</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Adicionar Gasto</button>
            </form>
        </div>

        <div class="panel-center">
            
            <div class="summary-grid">
                <div class="summary-card glass-panel">
                    <h4>Saldo Total</h4>
                    <h2 id="balance" class="val-total">R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Entradas</h4>
                    <h2 id="money-plus" class="val-plus">+ R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel">
                    <h4>Saídas</h4>
                    <h2 id="money-minus" class="val-minus">- R$ 0,00</h2>
                </div>
                <div class="summary-card glass-panel" style="border-bottom: 3px solid var(--orange);">
                    <h4>Devendo Amigos</h4>
                    <h2 id="money-debt" class="val-debt">R$ 0,00</h2>
                </div>
            </div>

            <div class="goals-panel glass-panel">
                <div class="goals-header">
                    <h2 class="section-title" style="margin:0;">🎯 Caixinha / Meta</h2>
                </div>
                <div class="goal-inputs">
                    <input type="text" id="goal-name" placeholder="Nome da Meta" onchange="saveGoal()">
                    <input type="number" id="goal-target" placeholder="Meta R$" onchange="saveGoal()">
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="goal-bar"></div>
                </div>
                <div class="goal-actions">
                    <span id="goal-status">Guardado: R$ 0,00 / R$ 0,00</span>
                    <button class="btn-add-goal" onclick="addToGoal()">+ Depositar</button>
                </div>
                <ul class="goal-history-list" id="goal-history"></ul>
            </div>

            <div class="glass-panel" style="min-height: 300px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h2 class="section-title" style="margin:0;">Histórico Diário</h2>
                    <select id="month-filter" style="background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; color: #fff; font-size: 13px; border: 1px solid var(--glass-border); outline: none;">
                        <option value="all">Todos os Meses</option>
                        <option value="01">Janeiro</option> <option value="02">Fevereiro</option> <option value="03" selected>Março</option>
                        <option value="04">Abril</option> <option value="05">Maio</option> <option value="06">Junho</option>
                        <option value="07">Julho</option> <option value="08">Agosto</option> <option value="09">Setembro</option>
                        <option value="10">Outubro</option> <option value="11">Novembro</option> <option value="12">Dezembro</option>
                    </select>
                </div>
                <ul id="list" class="list"></ul>
            </div>
        </div>

    </div>

    <div class="debts-wrapper glass-panel">
        <div class="goals-header" style="margin-bottom: 10px;">
            <h2 class="section-title" style="margin:0; color: var(--orange);">🏢 Gerenciamento de Dívidas (Empresas)</h2>
        </div>
        
        <div class="company-debt-summary">
            <h4>Total Devendo para Empresas</h4>
            <h2 id="total-company-debt">R$ 0,00</h2>
        </div>
        
        <form id="debt-form" style="margin-bottom: 25px;">
            <div class="form-row">
                <input type="text" id="debt-company" placeholder="Empresa / Credor" required />
                <input type="number" id="debt-total" placeholder="Valor Total (R$)" step="0.01" required />
                <input type="number" id="debt-installments" placeholder="Nº de Parcelas" min="1" required />
                <button type="submit" class="btn-submit" style="background-color: var(--orange); flex-shrink: 0; min-width: 150px;">Cadastrar</button>
            </div>
        </form>

        <div id="debts-list" class="debts-grid">
            </div>
    </div>

    <script>
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const money_debt = document.getElementById('money-debt');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');
        const categoryInput = document.getElementById('category');
        const submitBtn = document.getElementById('submit-btn');
        const monthFilter = document.getElementById('month-filter');
        const goalHistoryList = document.getElementById('goal-history');
        
        const debtForm = document.getElementById('debt-form');
        const debtsListUI = document.getElementById('debts-list');
        const totalCompanyDebtUI = document.getElementById('total-company-debt');

        try {
            document.getElementById('date').valueAsDate = new Date();
            monthFilter.value = String(new Date().getMonth() + 1).padStart(2, '0');
        } catch(e) {}

        function updateButtonColor() {
            if(!submitBtn || !typeInput) return;
            if (typeInput.value === 'plus') { submitBtn.style.backgroundColor = 'var(--green)'; submitBtn.style.color = '#000'; } 
            else { submitBtn.style.backgroundColor = 'var(--red)'; submitBtn.style.color = '#fff'; }
        }
        if(typeInput) typeInput.addEventListener('change', updateButtonColor);
        updateButtonColor();

        let transactions = [];
        try {
            const savedData = localStorage.getItem('transactions');
            if (savedData) {
                transactions = JSON.parse(savedData);
                if (!Array.isArray(transactions)) transactions = [];
            }
        } catch (error) { transactions = []; }
        
        let companyDebts = [];
        try {
            const savedDebts = localStorage.getItem('companyDebts');
            if(savedDebts) {
                companyDebts = JSON.parse(savedDebts);
                if(!Array.isArray(companyDebts)) companyDebts = [];
            }
        } catch(err) { companyDebts = []; }

        let goalData = { name: 'Reserva: Upgrade Positivo SIM+', target: 3500, current: 0, history: [] };
        try {
            const savedGoal = localStorage.getItem('myGoal');
            if (savedGoal) {
                const parsed = JSON.parse(savedGoal);
                goalData.name = parsed.name || 'Reserva: Upgrade Positivo SIM+';
                goalData.target = parseFloat(parsed.target) || 3500;
                goalData.current = parseFloat(parsed.current) || 0;
                goalData.history = Array.isArray(parsed.history) ? parsed.history : [];
            }
        } catch (error) {}
        
        document.getElementById('goal-name').value = goalData.name;
        document.getElementById('goal-target').value = goalData.target;
        
        function saveGoal() {
            goalData.name = document.getElementById('goal-name').value || 'Minha Meta';
            goalData.target = parseFloat(document.getElementById('goal-target').value) || 1;
            updateGoalUI();
            localStorage.setItem('myGoal', JSON.stringify(goalData));
        }

        function addToGoal() {
            let addVal = prompt("Quanto você quer depositar na caixinha?");
            if(addVal && !isNaN(addVal.replace(',','.'))) {
                let val = parseFloat(addVal.replace(',','.'));
                goalData.current += val;
                
                let tempDate = new Date();
                let d = String(tempDate.getDate()).padStart(2, '0');
                let m = String(tempDate.getMonth() + 1).padStart(2, '0');
                let formattedDate = `${tempDate.getFullYear()}-${m}-${d}`;
                
                let syncId = Math.floor(Math.random() * 100000000); 

                goalData.history.push({ id: syncId, amount: val, date: `${d}/${m}` });
                saveGoal();

                transactions.push({
                    id: syncId, 
                    text: '🎯 Depósito Caixinha',
                    amount: -val, 
                    date: formattedDate,
                    category: 'Outros', 
                    method: 'Pix/Dinheiro',
                    debt: 'Nenhum'
                });

                updateLocalStorage();
                init();
            }
        }

        function removeGoalDeposit(id) {
            let dep = goalData.history.find(d => d.id === id);
            if(dep) {
                goalData.current -= dep.amount;
                goalData.history = goalData.history.filter(d => d.id !== id);
                saveGoal();

                transactions = transactions.filter(t => t.id !== id);
                updateLocalStorage();
                init();
            }
        }

        function updateGoalUI() {
            let pct = (goalData.current / goalData.target) * 100;
            if(isNaN(pct)) pct = 0;
            if(pct > 100) pct = 100;
            document.getElementById('goal-bar').style.width = pct + '%';
            document.getElementById('goal-status').innerText = `Guardado: R$ ${goalData.current.toFixed(2).replace('.',',')} / R$ ${goalData.target.toFixed(2).replace('.',',')}`;
            
            goalHistoryList.innerHTML = '';
            goalData.history.forEach(dep => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>📅 ${dep.date}</span>
                    <span class="goal-val">+ R$ ${parseFloat(dep.amount).toFixed(2).replace('.',',')}</span>
                    <button class="delete-btn" onclick="removeGoalDeposit(${dep.id})" style="width: 22px; height: 22px; font-size: 10px; margin-left: auto; margin-right: 0;">X</button>
                `;
                goalHistoryList.appendChild(li);
            });
        }

        function exportData() {
            const dataStr = JSON.stringify({ transactions, goalData, companyDebts });
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url; link.download = 'backup_financas_guigo.json'; link.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.transactions) transactions = imported.transactions;
                    if(imported.companyDebts) companyDebts = imported.companyDebts;
                    if(imported.goalData) {
                        goalData = imported.goalData;
                        if(!goalData.history) goalData.history = [];
                        document.getElementById('goal-name').value = goalData.name;
                        document.getElementById('goal-target').value = goalData.target;
                    }
                    updateLocalStorage(); saveGoal(); init();
                    alert("Backup restaurado com sucesso!");
                } catch(err) { alert("Erro ao ler o arquivo de backup."); }
            };
            reader.readAsText(file);
        }

        function animateCoinAndSave(transactionDataArr) {
            const wrapper = document.createElement('div'); wrapper.className = 'coin-wrapper';
            const coin = document.createElement('div'); coin.className = 'coin-anim'; wrapper.appendChild(coin);
            
            const btnRect = submitBtn.getBoundingClientRect();
            wrapper.style.left = (btnRect.left + btnRect.width/2 - 10) + 'px';
            wrapper.style.top = (btnRect.top + btnRect.height/2 - 10) + 'px';
            document.body.appendChild(wrapper);

            const listRect = list.getBoundingClientRect();
            const destX = listRect.left + 30; const destY = listRect.top > 0 ? listRect.top + 20 : window.innerHeight / 2;

            setTimeout(() => {
                wrapper.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s';
                wrapper.style.transform = `translate(${destX - parseFloat(wrapper.style.left)}px, ${destY - parseFloat(wrapper.style.top)}px) scale(0.5)`;
                wrapper.style.opacity = '0.2';
            }, 10);

            setTimeout(() => {
                wrapper.remove();
                transactions.push(...transactionDataArr);
                updateLocalStorage(); init();
            }, 510);
        }

        function addCompanyDebt(e) {
            e.preventDefault();
            const company = document.getElementById('debt-company').value;
            const total = parseFloat(document.getElementById('debt-total').value);
            const installments = parseInt(document.getElementById('debt-installments').value);

            companyDebts.push({
                id: Math.floor(Math.random() * 100000000),
                company: company,
                totalAmount: total,
                installments: installments,
                paidInstallments: 0
            });

            document.getElementById('debt-company').value = '';
            document.getElementById('debt-total').value = '';
            document.getElementById('debt-installments').value = '';
            
            updateLocalStorage();
            init();
        }

        function renderDebts() {
            debtsListUI.innerHTML = '';
            
            let totalRemaining = 0; // Para calcular o valor do novo balãozinho
            
            companyDebts.forEach(debt => {
                const installmentValue = debt.totalAmount / debt.installments;
                const remainingAmount = debt.totalAmount - (installmentValue * debt.paidInstallments);
                const isFinished = debt.paidInstallments >= debt.installments;
                const pct = (debt.paidInstallments / debt.installments) * 100;

                if (!isFinished) {
                    totalRemaining += remainingAmount;
                }

                const card = document.createElement('div');
                card.className = `debt-card ${isFinished ? 'finished' : ''}`;
                
                card.innerHTML = `
                    <div class="debt-header">
                        <span class="debt-company">🏢 ${debt.company}</span>
                        <button class="delete-btn" onclick="deleteCompanyDebt(${debt.id})">X</button>
                    </div>
                    <div class="debt-details">
                        <strong>Total:</strong> R$ ${debt.totalAmount.toFixed(2).replace('.', ',')}<br>
                        <strong>Restante:</strong> R$ ${remainingAmount.toFixed(2).replace('.', ',')}<br>
                        <strong>Valor da Parcela:</strong> R$ ${installmentValue.toFixed(2).replace('.', ',')}
                    </div>
                    
                    <div style="font-size: 11px; margin-bottom: 3px;">Progresso: ${debt.paidInstallments}/${debt.installments} parcelas</div>
                    <div class="debt-progress-container">
                        <div class="debt-progress-bar" style="width: ${pct}%"></div>
                    </div>

                    <div class="debt-actions">
                        <button class="btn-pay-debt" ${isFinished ? 'disabled' : ''} onclick="payDebtInstallment(${debt.id}, '${debt.company}', ${installmentValue})">
                            ${isFinished ? '✅ Quitado' : '💳 Pagar Parcela'}
                        </button>
                    </div>
                `;
                debtsListUI.appendChild(card);
            });
            
            // Atualiza o novo balãozinho isolado
            totalCompanyDebtUI.innerText = `R$ ${totalRemaining.toFixed(2).replace('.', ',')}`;
        }

        function payDebtInstallment(id, company, value) {
            if(confirm(`Confirmar o pagamento de 1 parcela de R$ ${value.toFixed(2).replace('.',',')} para ${company}?`)) {
                let debt = companyDebts.find(d => d.id === id);
                if(debt) {
                    debt.paidInstallments += 1;
                    
                    let tempDate = new Date();
                    let formattedDate = `${tempDate.getFullYear()}-${String(tempDate.getMonth() + 1).padStart(2, '0')}-${String(tempDate.getDate()).padStart(2, '0')}`;
                    
                    transactions.push({
                        id: Math.floor(Math.random() * 100000000),
                        text: `Pagamento: ${company} (${debt.paidInstallments}/${debt.installments})`,
                        amount: -value,
                        date: formattedDate,
                        category: 'Casa', 
                        method: 'Pix/Dinheiro',
                        debt: 'Nenhum'
                    });

                    updateLocalStorage();
                    init();
                }
            }
        }

        function deleteCompanyDebt(id) {
            if(confirm("Tem certeza que deseja apagar este registro de dívida? (Isso não apaga os pagamentos já feitos no histórico)")) {
                companyDebts = companyDebts.filter(d => d.id !== id);
                updateLocalStorage();
                init();
            }
        }

        function addTransaction(e) {
            e.preventDefault();
            let totalAmount = parseFloat(amountInput.value);
            let numInstallments = parseInt(document.getElementById('installments').value);
            totalAmount = typeInput.value === 'minus' ? -Math.abs(totalAmount) : Math.abs(totalAmount);
            let installmentAmount = totalAmount / numInstallments;
            
            let dateParts = document.getElementById('date').value.split('-');
            let year = parseInt(dateParts[0]), month = parseInt(dateParts[1]) - 1, day = parseInt(dateParts[2]);

            let newTransactions = [];
            for(let i = 0; i < numInstallments; i++) {
                let tempDate = new Date(year, month + i, day);
                let formattedDate = `${tempDate.getFullYear()}-${String(tempDate.getMonth() + 1).padStart(2, '0')}-${String(tempDate.getDate()).padStart(2, '0')}`;
                let textSuffix = numInstallments > 1 ? ` (${i+1}/${numInstallments})` : '';

                newTransactions.push({
                    id: Math.floor(Math.random() * 100000000),
                    text: textInput.value + textSuffix,
                    amount: installmentAmount,
                    date: formattedDate,
                    category: categoryInput.value || 'Outros',
                    method: document.getElementById('payment-method').value,
                    debt: document.getElementById('debt-to').value
                });
            }
            animateCoinAndSave(newTransactions);
            
            textInput.value = ''; amountInput.value = ''; 
            document.getElementById('installments').value = '1'; categoryInput.value = '';
        }

        function getCategoryIcon(catName) {
            if(catName === 'Casa') return '🏠';
            if(catName === 'Carro') return '🚗';
            if(catName === 'Saidas') return '🍻';
            if(catName === 'Lazer') return '🎮';
            if(catName === 'Supermercado') return '🛒';
            if(catName === 'Salario') return '💼';
            return '💸';
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
            
            let debtBadge = transaction.debt !== 'Nenhum' ? `<span class="badge" style="color:var(--orange);border-color:var(--orange)">Dívida: ${transaction.debt}</span>` : '';
            
            let dateBR = "Sem data";
            if(transaction.date && transaction.date.includes('-')) {
                dateBR = transaction.date.split('-').reverse().join('/');
            }
            
            let catIcon = getCategoryIcon(transaction.category);

            item.innerHTML = `
                <div class="item-info">
                    <span class="item-title">${catIcon} ${transaction.text}</span>
                    <span class="item-meta"><span class="badge">${transaction.method}</span> ${debtBadge} • ${dateBR}</span>
                </div>
                <div class="item-actions">
                    <span style="font-weight:600; font-size:16px;">${sign} R$ ${Math.abs(transaction.amount).toFixed(2).replace('.', ',')}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">X</button>
                </div>
            `;
            list.appendChild(item);
        }

        function updateValues(filtered) {
            const amounts = filtered.map(t => parseFloat(t.amount) || 0);
            const total = amounts.reduce((acc, item) => acc + item, 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => acc + item, 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => acc + item, 0) * -1).toFixed(2);
            
            // Aqui ele volta a somar EXCLUSIVAMENTE as dívidas do formulário principal (Michele e Andressa)
            const oldDebt = transactions.filter(t => t.debt !== 'Nenhum' && t.amount < 0).map(t => parseFloat(t.amount) || 0).reduce((acc, item) => acc + item, 0) * -1;
            
            balance.innerText = `R$ ${total.replace('.', ',')}`;
            money_plus.innerText = `+ R$ ${income.replace('.', ',')}`;
            money_minus.innerText = `- R$ ${expense.replace('.', ',')}`;
            money_debt.innerText = `R$ ${oldDebt.toFixed(2).replace('.', ',')}`;
        }

        function removeTransaction(id) { 
            transactions = transactions.filter(t => t.id !== id); 
            
            let dep = goalData.history.find(d => d.id === id);
            if(dep) {
                goalData.current -= dep.amount;
                goalData.history = goalData.history.filter(d => d.id !== id);
                saveGoal();
            }

            updateLocalStorage(); 
            init(); 
        }
        
        function updateLocalStorage() { 
            localStorage.setItem('transactions', JSON.stringify(transactions)); 
            localStorage.setItem('companyDebts', JSON.stringify(companyDebts));
        }

        function init() {
            try {
                list.innerHTML = '';
                const selMonth = monthFilter.value;
                const filtered = selMonth === 'all' ? transactions : transactions.filter(t => {
                    if(!t || !t.date || !t.date.includes('-')) return false;
                    return t.date.split('-')[1] === selMonth;
                });
                filtered.sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
                filtered.forEach(addTransactionDOM);
                
                updateValues(filtered);
                updateGoalUI();
                renderDebts();
            } catch(e) {}
        }

        if(monthFilter) monthFilter.addEventListener('change', init);
        if(form) form.addEventListener('submit', addTransaction);
        if(debtForm) debtForm.addEventListener('submit', addCompanyDebt);

        init();
    </script>
</body>
</html>
